<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attraction Cursor</title>
    <style>
        /* Стили */
        body,
        html,
        #app {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            touch-action: none;
            background-color: #000;
            /* Фон для контраста */
        }

        #app {
            height: 100%;
            font-family: "Montserrat", sans-serif;
        }

        #canvas {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            overflow: hidden;
        }

        .buttons {
            position: fixed;
            width: 100%;
            bottom: 15px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        button,
        a {
            color: black;
            font-family: "Montserrat", sans-serif;
            font-size: 12px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 5px;
            border: 1px solid grey;
            padding: 4px 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover,
        a:hover {
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>

    <div id="app">
        <canvas id="canvas"></canvas>

        <div class="buttons">
            <button type="button" id="colors-btn">
                Random colors
            </button>
            <a href="https://normanramm.github.io/WebEncyclopediaVladAvrely/#" target="_blank">
                Web Encyclopedia
            </a>
        </div>
    </div>

    <script type="module">
        // Импорт библиотеки напрямую в скрипт
        import AttractionCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.26/build/cursors/attraction1.min.js"

        // Инициализация эффекта
        const app = AttractionCursor(document.getElementById('canvas'), {
            particles: {
                attractionIntensity: 0.75,
                size: 1.5,
            },
        })

        // Логика кнопки смены цветов
        const button1 = document.getElementById('colors-btn')

        button1.addEventListener('click', () => {
            // Генерируем случайные цвета для источников света частиц
            app.particles.light1.color.set(Math.random() * 0xffffff)
            app.particles.light2.color.set(Math.random() * 0xffffff)
        })
    </script>

</body>

</html>
